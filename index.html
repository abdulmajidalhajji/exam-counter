<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Countdown to June 6, 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="countdown-container">
    <h1 class="main-title">العد التنازلي لامتحان البكلوريا</h1>
    <div id="countdown">
        <div class="stars"></div>
        
        <div class="time-box">
            <span id="days">00</span>
            <p>أيام</p>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <p>ساعات</p>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <p>دقائق</p>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <p>ثواني</p>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
